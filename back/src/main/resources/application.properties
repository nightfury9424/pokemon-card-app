spring.application.name=pokemon-card-back
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Multipart 파일 업로드 크기 제한
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pokemon_card_db}
spring.datasource.username=${DB_USER:nightfury}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA - open-in-view 경고 제거
spring.jpa.open-in-view=false

# Server
server.port=8080

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Google OAuth2
google.client-id=${GOOGLE_CLIENT_ID:}

# Card images
card.image.dir=${CARD_IMAGE_DIR:./images/cards}

# Trade images
trade.image.dir=${TRADE_IMAGE_DIR:./trade_images}

# Asset grading images
asset.grading.image.dir=${ASSET_GRADING_IMAGE_DIR:./asset_grading_images}

# JWT
jwt.secret=${JWT_SECRET:dev-secret-replace-in-prod-min-32-bytes-required-here}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Pokemon TCG API (pokemontcg.io) - 무료 키: https://dev.pokemontcg.io/
ptcg.api-key=${PTCG_API_KEY:}

# Grading Service
grading.service.url=${GRADING_SERVICE_URL:http://localhost:8081}

# 스캐너 v2 (DINOv2+FAISS FastAPI)
scanner.base-url=${SCANNER_BASE_URL:http://localhost:8082}

# 운영 알림 — PriceSyncScheduler 같은 백그라운드 잡 실패 시 인앱 알림 받을 user_id
app.ops.admin-user-id=${OPS_ADMIN_USER_ID:}

# Python 실행 경로 — PriceSyncScheduler가 호출하는 시세 스크래퍼/계수 재계산.
# prod 컨테이너에서는 PYTHON_SCRIPTS_DIR=/app/python, PYTHON_SYSTEM=/usr/local/bin/python3 등으로 주입.
app.python.system=${PYTHON_SYSTEM:/usr/bin/python3}
app.python.venv-kream=${PYTHON_VENV_KREAM:/Users/fury/pokemon-card-app/python/.venv_kream/bin/python}
app.python.scripts-dir=${PYTHON_SCRIPTS_DIR:/Users/fury/pokemon-card-app/python}

# CORS allowed origins — comma-separated. prod는 CORS_ALLOWED_ORIGINS 명시 필수.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://127.0.0.1:8080}

# Admin API 인증 — prod는 ADMIN_AUTH_ENABLED=true 강제 (관리자 JWT/role 가드).
app.admin.auth-enabled=${ADMIN_AUTH_ENABLED:false}

# 사용자 API 인증 강제 — prod는 API_AUTH_ENFORCED=true 강제.
# cards/prices/assets/trades/buy-orders/notifications/scanner/grading 등 사용자/거래 API.
# local default false = 개발 편의 (앱 거치지 않고 직접 API 호출 가능).
# 정책: 로그인하지 않으면 카드/시세 화면 자체를 못 쓰는 구조 → prod에선 무조건 authenticated.
app.api.auth-enforced=${API_AUTH_ENFORCED:false}

# 개발용 로그인 (/api/auth/dev/**) toggle — prod=false 강제.
# local default true (편의), prod 미설정/false면 dev-login deny.
# 누구나 JWT 발급 차단 (Codex 리뷰 Critical 4).
app.auth.dev-login-enabled=${DEV_LOGIN_ENABLED:true}

# /api/internal/** token — nginx 외부 차단 + InternalTokenFilter 검증.
# 미설정 시 모든 internal 요청 403 (fail-closed).
app.internal.admin-token=${INTERNAL_ADMIN_TOKEN:}

# ──────────────── Phase 1-7: 이미지 저장소 ────────────────
# type=local  : LocalImageStorageService — disk (개발 편의)
# type=s3     : S3ImageStorageService    — AWS S3 또는 MinIO/R2 (S3 API 호환)
app.image-storage.type=${IMAGE_STORAGE_TYPE:local}

# local storage base dir (type=local일 때만)
app.image-storage.local.base-dir=${LOCAL_UPLOAD_DIR:${user.home}/pokefolio-uploads}

# AWS S3 — type=s3일 때만 사용 (placeholder, 실제 값은 prod env 또는 .env)
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.region=${AWS_S3_REGION:ap-northeast-2}
# AWS S3 default endpoint(빈값) / MinIO local test 시 http://localhost:9000
aws.s3.endpoint=${AWS_S3_ENDPOINT:}
aws.access-key=${AWS_ACCESS_KEY_ID:}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
