<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 빨간 윗부분 -->
  <path d="M 10,50 A 40,40 0 0,1 90,50 Z" fill="#E53935"/>
  <!-- 흰 아랫부분 -->
  <path d="M 10,50 A 40,40 0 0,0 90,50 Z" fill="#FAFAFA"/>
  <!-- 외곽선 -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#212121" stroke-width="4"/>
  <!-- 가운데 가로선 -->
  <line x1="10" y1="50" x2="90" y2="50" stroke="#212121" stroke-width="4"/>
  <!-- 중앙 버튼 검정 테두리 -->
  <circle cx="50" cy="50" r="11" fill="#212121"/>
  <!-- 중앙 버튼 흰색 -->
  <circle cx="50" cy="50" r="7" fill="#FAFAFA"/>
  <!-- 중앙 버튼 하이라이트 -->
  <circle cx="47" cy="47" r="2.5" fill="white" opacity="0.7"/>
</svg>
