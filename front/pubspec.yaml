name: front
description: "포켓몬 카드 자산관리 앱"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 구글 로그인
  google_sign_in: ">=6.2.1 <6.3.0"

  # 카메라 + OCR
  camera: ^0.11.1
  google_mlkit_text_recognition: ^0.15.1
  permission_handler: ^11.3.1

  # 네트워크
  dio: ^5.8.0+1

  # 저장소 (JWT)
  flutter_secure_storage: ^9.2.4

  # 라우팅
  go_router: ^14.8.1

  # 차트
  fl_chart: ^0.70.2

  # 이미지 선택 (갤러리 / 카메라)
  image_picker: ^1.1.2
  path_provider: ^2.1.5

  # 카메라 프레임 변환
  image: ^4.5.0

  # SVG 렌더링
  flutter_svg: ^2.0.10+1

  # WebSocket (STOMP 채팅)
  stomp_dart_client: ^2.1.0

  # 카드 이미지 캐싱 — S3 immutable 마스터 이미지 디스크 캐시
  cached_network_image: ^3.4.1

  # mailto 등 외부 URL launcher (고객지원 화면)
  url_launcher: ^6.3.0

  # 고객지원 문의 — 카테고리별 폼 + 사진 첨부 후 네이티브 메일 composer 호출.
  # mailto 자체는 첨부 미지원이라 iOS MFMailComposeViewController / Android Intent 래퍼 필요.
  flutter_email_sender: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/balls/
    - assets/app_icon/

# 앱 아이콘 일괄 생성 — dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon/logo.png"
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  min_sdk_android: 21
