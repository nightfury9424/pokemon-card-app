name: front
description: "포켓몬 카드 자산관리 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 카카오 로그인
  kakao_flutter_sdk_user: ^1.9.9

  # 카메라 + OCR
  camera: ^0.11.1
  google_mlkit_text_recognition: ^0.13.1
  permission_handler: ^11.3.1

  # 네트워크
  dio: ^5.8.0+1

  # 저장소 (JWT)
  flutter_secure_storage: ^9.2.4

  # 라우팅
  go_router: ^14.8.1

  # 차트
  fl_chart: ^0.70.2

  # 이미지 선택 (갤러리 / 카메라)
  image_picker: ^1.1.2

  # SVG 렌더링
  flutter_svg: ^2.0.10+1

  # WebSocket (STOMP 채팅)
  stomp_dart_client: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/balls/
